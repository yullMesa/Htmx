<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/Front.css">
    <title>Gaming Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>

<body>
    <div class="portada">

        <img src="Style/Ink/GaimgTool.png" alt="Gaming Tool Logo" class="logo-principal">

    </div>

    <div class="contenido-inferior">

        <img src="Style/Ink/Characters.png" alt="Mouse Icon" class="characters">

    </div>

    <div class="Login-box">
        <div class="input-group">
            <label>Usuarios</label>
            <input type="text" placeholder="Ingrese su Nombre de Usuario">
        </div>

        <div class="input-group">

            <label>Contraseña</label>
            <input type="password" placeholder="Ingrese su Contraseña">

        </div>

        <div class="botones-group">
            <button class="btn-steam">Iniciar Sesión</button>
            <button class="btn-steam ">Registrarse</button>
        </div>
    </div>

    

</body>

</html>
